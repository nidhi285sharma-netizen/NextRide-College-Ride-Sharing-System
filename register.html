<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — NextRide</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }
    .auth-card {
      width:100%; max-width:460px;
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-xl); padding:40px;
      box-shadow:var(--shadow-card);
    }
    .auth-card h2 { margin-bottom:6px; }
    .auth-card .subtitle { color:var(--text-muted); font-size:0.875rem; margin-bottom:28px; }
    .auth-form { display:flex; flex-direction:column; gap:16px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div style="position:fixed;top:16px;right:16px">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
  </div>

  <div class="auth-card fade-in">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <a href="/login" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join NextRide and start sharing rides on campus</p>

    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="name" placeholder="Arjun Sharma" required>
      </div>
      <div class="form-group">
        <label class="form-label">College Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@college.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-input" id="phone" placeholder="9876543210">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
        Create Account
      </button>
    </form>

    <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);margin-top:20px">
      Already have an account?
      <a href="/login" style="color:var(--accent-1);font-weight:600">Sign in</a>
    </p>
  </div>
</div>

<script src="/static/js/main.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Creating...';

  try {
    await API.post('/api/register', {
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      phone:    document.getElementById('phone').value,
      password: document.getElementById('password').value,
    });
    Toast.show('Account created! Please sign in.', 'success');
    setTimeout(() => window.location.href = '/login', 1200);
  } catch (err) {
    Toast.show(err.message, 'error');
    btn.disabled = false; btn.innerHTML = 'Create Account';
  }
});
</script>
</body>
</html>
